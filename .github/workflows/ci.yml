name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
        build_type: [Release]

    steps:
    - uses: actions/checkout@v4

    - name: Install dependencies (Ubuntu)
      if: runner.os == 'Linux'
      run: sudo apt-get update && sudo apt-get install -y cmake python3

    - name: Configure
      run: cmake -S . -B build -DCMAKE_BUILD_TYPE=${{ matrix.build_type }}

    - name: Build
      run: cmake --build build -j$(nproc 2>/dev/null || sysctl -n hw.ncpu)

    - name: Test
      run: cd build && ctest --output-on-failure

    - name: End-to-end test
      run: |
        ./build/slang-cdc tests/basic/02_missing_sync.sv --top missing_sync --format json -o /tmp/cdc_out
        test -f /tmp/cdc_out/cdc_report.json
        grep -q '"violations": 1' /tmp/cdc_out/cdc_report.json
        echo "E2E test passed: 1 violation detected"
